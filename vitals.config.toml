# vitals.config.toml — project registry
#
# Lists all monitored projects and where their data lives.
# Secrets are referenced as env var names injected via:
#   op run --env-file=secrets.env -- <command>
# See secrets.env.example for op:// paths.

[[projects]]
id = "pilots"
name = "Pilots"

  [[projects.logs]]
  source = "axiom"
  dataset = "pilots"
  token = "${AXIOM_TOKEN}"

